<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Spinstate Rally</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; margin: 0; overflow: hidden;
      background: #050714; color: #f5f7ff;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overscroll-behavior: none;
    }
    #game {
      position: fixed; inset: 0; width: 100vw; height: 100dvh;
      display: block; touch-action: none; user-select: none; outline: none; cursor: crosshair;
    }
    #actionButton {
      position: fixed; z-index: 3; left: 50%; bottom: max(22px, env(safe-area-inset-bottom));
      transform: translateX(-50%); border: 0; border-radius: 999px; padding: 13px 24px;
      color: #071018; background: #80f7ff; font-weight: 900; letter-spacing: .02em;
      box-shadow: 0 0 24px rgba(128,247,255,.34);
    }
    #actionButton[hidden] { display: none; }
  </style>
</head>
<body>
<canvas id="game" tabindex="0" aria-label="Spinstate Rally game canvas"></canvas>
<button id="actionButton" type="button">Start game</button>

<script>
(() => {
  "use strict";

  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const actionButton = document.getElementById("actionButton");

  let W = 960, H = 600, DPR = 1;

  const C = {
    text: "#f5f7ff", muted: "#a6afcf", cyan: "#80f7ff", pink: "#ff5f7e",
    gold: "#ffd166", purple: "#a98cff", green: "#80ff9a", blue: "#55a7ff", stone: "#858da9"
  };

  const CFG = {
    arena: { pad: 18 },
    paddle: { x: 34, enemyGap: 48, w: 14, h: 68, enemyH: 84, speed: 540, boost: 1.75, precision: 0.45 },
    ball: {
      r: 8, startSpeed: 390, minSpeed: 430, maxSpeed: 780,
      maxSpin: 2.7, magnus: 0.92, spinDecay: 0.945,
      wallSpinKeep: 0.92, wallFriction: 0.055, wallSpinTransfer: 0.0045, wallExitBias: 34,
      minHorizontalRatio: 0.50, maxVerticalRatio: 1.18
    },
    blocks: {
      w: 44, h: 26, base: 7, max: 32, respawnBase: 3.8, respawnStep: 0.23,
      respawnMin: 0.75, marginX: 150, marginY: 92
    },
    rooms: 12
  };

  const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
  const rand = (lo, hi) => lo + Math.random() * (hi - lo);
  const pick = arr => arr[Math.floor(Math.random() * arr.length)];
  const speedOf = b => b ? Math.hypot(b.vx, b.vy) : 0;

  const keys = new Set();
  const pointer = { mode: "mouse", active: false, y: H / 2, lastX: null, lastY: null };

  const store = {
    get(k, v) { try { return Number(localStorage.getItem(k) || v); } catch { return v; } },
    set(k, v) { try { localStorage.setItem(k, String(v)); } catch {} }
  };

  const state = {
    mode: "title", paused: false, room: 1, score: 0, best: store.get("spinstate-rally-best", 0),
    combo: 0, comboTimer: 0, last: performance.now(), shake: 0, flash: 0,
    message: "", messageTimer: 0,
    player: null, enemy: null, mods: null,
    balls: [], blocks: [], previews: [], particles: [], floats: [], draft: [], relics: []
  };

  const relics = [
    ["wide", "Giant Bat", "▌", "+22% paddle height.", () => state.mods.paddleScale += .22],
    ["boots", "Greased Boots", "⇅", "+18% paddle speed.", () => state.mods.paddleSpeed *= 1.18],
    ["heart", "Iron Heart", "♥", "+1 max HP and heal 1.", () => { state.mods.maxHp++; state.player.hp = Math.min(state.mods.maxHp, state.player.hp + 1); }],
    ["meteor", "Meteor Ball", "✦", "+1 ball damage.", () => state.mods.damage++],
    ["comet", "Comet Core", "●", "+12% ball speed.", () => state.mods.ballSpeed *= 1.12],
    ["echo", "Echo Orb", "◎", "+1 extra ball each room.", () => state.mods.extraBalls++],
    ["gyro", "Gyro Grip", "◌", "+40% spin power.", () => state.mods.spinPower *= 1.4],
    ["razor", "Razor Spin", "↯", "High-spin goals deal +1 damage.", () => state.mods.spinDamage = true],
    ["rust", "Rust Hex", "⌁", "Enemy paddle is 14% slower.", () => state.mods.enemySlow *= .86],
    ["shield", "Glass Aegis", "◇", "+1 shield against a miss.", () => state.mods.shield++],
    ["luck", "Lucky Edge", "⚅", "+12% chance to double damage.", () => state.mods.crit += .12]
  ].map(([id, name, icon, desc, apply]) => ({ id, name, icon, desc, apply }));

  function baseMods() {
    return {
      paddleScale: 1, paddleSpeed: 1, ballSpeed: 1, damage: 1, radius: CFG.ball.r,
      spinPower: 1, spinDamage: false, extraBalls: 0, maxHp: 5, shield: 0, enemySlow: 1, crit: 0
    };
  }

  function resize() {
    DPR = Math.min(devicePixelRatio || 1, 2);
    W = Math.max(360, innerWidth || 960);
    H = Math.max(420, innerHeight || 600);
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + "px";
    canvas.style.height = H + "px";
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    if (state.player) state.player.x = CFG.paddle.x;
    if (state.enemy) state.enemy.x = W - CFG.paddle.enemyGap;
    clampActors();
  }

  function clampActors() {
    for (const p of [state.player, state.enemy]) if (p) p.y = clamp(p.y, 24 + p.h / 2, H - 24 - p.h / 2);
    for (const b of state.balls) { b.x = clamp(b.x, 30, W - 30); b.y = clamp(b.y, 30, H - 30); }
  }

  function makePaddle(x, y, color, hp, h, speed) {
    return { x, y, oldY: y, vy: 0, w: CFG.paddle.w, h, baseH: h, speed, hp, maxHp: hp, color, invuln: 0, stun: 0 };
  }

  function makeEnemy() {
    const hp = 4 + Math.floor(state.room * 1.35);
    return makePaddle(W - CFG.paddle.enemyGap, H / 2, pick([C.purple, C.pink, C.green, C.gold, C.blue]), hp, CFG.paddle.enemyH + state.room * 3, 330 + state.room * 10);
  }

  function targetBlocks() { return clamp(CFG.blocks.base + state.room * 2, CFG.blocks.base, CFG.blocks.max); }
  function respawnDelay() { return clamp(CFG.blocks.respawnBase - state.room * CFG.blocks.respawnStep, CFG.blocks.respawnMin, CFG.blocks.respawnBase); }
  function blockType() {
    let t = "brick";
    if (state.room >= 3 && Math.random() < .24) t = "stone";
    if (state.room >= 4 && Math.random() < .16) t = "spike";
    if (state.room >= 6 && Math.random() < .12) t = "portal";
    return t;
  }
  function blockHp(t) { return t === "stone" ? 3 : t === "portal" ? 2 : 1; }
  function blockColor(b) { return b.type === "stone" ? C.stone : b.type === "spike" ? C.pink : b.type === "portal" ? C.purple : C.gold; }
  function makeBlock(x, y, type) { const hp = blockHp(type); return { x, y, w: CFG.blocks.w, h: CFG.blocks.h, type, hp, maxHp: hp }; }
  function overlap(a, b, pad = 14) { return a.x < b.x + b.w + pad && a.x + a.w + pad > b.x && a.y < b.y + b.h + pad && a.y + a.h + pad > b.y; }

  function spawnRect() {
    const { w, h, marginX, marginY } = CFG.blocks;
    const minX = Math.max(marginX, W * .24), maxX = Math.min(W - marginX - w, W * .76);
    const minY = marginY, maxY = H - marginY - h;
    const existing = state.blocks.concat(state.previews);
    for (let i = 0; i < 120; i++) {
      const c = { x: rand(minX, Math.max(minX + 1, maxX)), y: rand(minY, Math.max(minY + 1, maxY)), w, h };
      if (!existing.some(e => overlap(c, e, 16))) return c;
    }
    return { x: rand(minX, Math.max(minX + 1, maxX)), y: rand(minY, Math.max(minY + 1, maxY)), w, h };
  }

  function scheduleBlock(delay = respawnDelay()) {
    const r = spawnRect();
    state.previews.push({ ...r, type: blockType(), time: delay, total: delay });
  }

  function fillBlocks() {
    state.blocks = [];
    state.previews = [];
    for (let i = 0; i < targetBlocks(); i++) {
      const r = spawnRect();
      state.blocks.push(makeBlock(r.x, r.y, blockType()));
    }
  }

  function updatePreviews(dt) {
    while (state.blocks.length + state.previews.length < targetBlocks()) scheduleBlock();
    for (let i = state.previews.length - 1; i >= 0; i--) {
      const p = state.previews[i];
      p.time -= dt;
      if (p.time <= 0) {
        state.blocks.push(makeBlock(p.x, p.y, p.type));
        burst(p.x + p.w / 2, p.y + p.h / 2, blockColor(p), 14);
        state.previews.splice(i, 1);
      }
    }
  }

  function newRun() {
    Object.assign(state, {
      mode: "playing", paused: false, room: 1, score: 0, combo: 0, comboTimer: 0,
      shake: 0, flash: 0, message: "Room 1", messageTimer: 1.25,
      balls: [], blocks: [], previews: [], particles: [], floats: [], draft: [], relics: [], mods: baseMods()
    });
    state.player = makePaddle(CFG.paddle.x, H / 2, C.cyan, 5, CFG.paddle.h, CFG.paddle.speed);
    state.enemy = makeEnemy();
    fillBlocks();
    serve(1 + state.mods.extraBalls);
    canvas.focus();
    syncButton();
  }

  function serve(count = 1) {
    for (let i = 0; i < count; i++) {
      const dir = Math.random() < .5 ? -1 : 1;
      const sp = (CFG.ball.startSpeed + state.room * 10) * state.mods.ballSpeed;
      const a = rand(-.42, .42);
      state.balls.push({
        x: W / 2 + rand(-18, 18), y: H / 2 + rand(-70, 70),
        vx: Math.cos(a) * sp * dir, vy: Math.sin(a) * sp,
        r: state.mods.radius, damage: state.mods.damage, spin: 0, lift: 0,
        lastHit: "none", wallBounceStreak: 0, lastWallBounceAt: 0, trail: []
      });
    }
  }

  function createDraft() {
    const repeat = ["heart", "shield", "luck", "meteor", "comet"];
    const pool = relics.filter(r => !state.relics.includes(r.id) || repeat.includes(r.id));
    state.draft = [];
    while (state.draft.length < 3 && pool.length) {
      const r = pick(pool);
      if (!state.draft.includes(r)) state.draft.push(r);
    }
    state.mode = "upgrade";
    state.message = "Choose a relic";
    state.messageTimer = 1.1;
    syncButton();
  }

  function chooseRelic(i) {
    if (state.mode !== "upgrade" || !state.draft[i]) return;
    const r = state.draft[i];
    r.apply();
    state.relics.push(r.id);
    state.room++;
    if (state.room > CFG.rooms) { state.mode = "victory"; saveBest(); syncButton(); return; }
    state.balls = [];
    state.enemy = makeEnemy();
    fillBlocks();
    state.mode = "playing";
    state.message = "Room " + state.room;
    state.messageTimer = 1.25;
    serve(1 + state.mods.extraBalls);
    syncButton();
  }

  function update(dt) {
    if (state.mode !== "playing" || state.paused) { updateEffects(dt); return; }
    state.messageTimer = Math.max(0, state.messageTimer - dt);
    state.comboTimer = Math.max(0, state.comboTimer - dt);
    if (state.comboTimer === 0) state.combo = 0;
    state.shake = Math.max(0, state.shake - dt * 20);
    state.flash = Math.max(0, state.flash - dt * 1.7);
    state.player.invuln = Math.max(0, state.player.invuln - dt);
    state.enemy.stun = Math.max(0, state.enemy.stun - dt);
    updatePreviews(dt);
    updatePlayer(dt);
    updateEnemy(dt);
    updateBalls(dt);
    updateEffects(dt);
    if (!state.balls.length && state.mode === "playing") serve(1);
  }

  function paddleMultiplier() {
    let m = state.mods ? state.mods.paddleSpeed : 1;
    if (keys.has("ShiftLeft") || keys.has("ShiftRight")) m *= CFG.paddle.boost;
    if (keys.has("AltLeft") || keys.has("AltRight") || keys.has("ControlLeft") || keys.has("ControlRight")) m *= CFG.paddle.precision;
    return m;
  }

  function updatePlayer(dt) {
    const p = state.player;
    p.h = p.baseH * state.mods.paddleScale;
    p.oldY = p.y;
    const k = (keys.has("KeyS") || keys.has("ArrowDown") ? 1 : 0) - (keys.has("KeyW") || keys.has("ArrowUp") ? 1 : 0);
    if (pointer.active && pointer.mode === "mouse") p.y += (pointer.y - p.y) * clamp(dt * 16, 0, 1);
    p.y += k * p.speed * paddleMultiplier() * dt;
    p.y = clamp(p.y, 24 + p.h / 2, H - 24 - p.h / 2);
    p.vy = (p.y - p.oldY) / Math.max(dt, .001);
  }

  function updateEnemy(dt) {
    const e = state.enemy;
    e.oldY = e.y;
    if (e.stun > 0) { e.vy = 0; return; }
    const target = state.balls.filter(b => b.vx > 0).sort((a, b) => b.x - a.x)[0] || state.balls[0];
    const ty = target ? target.y + Math.sin(performance.now() / 430 + state.room) * 24 : H / 2;
    e.y += clamp(ty - e.y, -1, 1) * e.speed * state.mods.enemySlow * dt;
    e.y = clamp(e.y, 24 + e.h / 2, H - 24 - e.h / 2);
    e.vy = (e.y - e.oldY) / Math.max(dt, .001);
  }

  function updateBalls(dt) {
    for (let i = state.balls.length - 1; i >= 0; i--) {
      const b = state.balls[i];
      b.trail.push({ x: b.x, y: b.y, life: .22 });
      if (b.trail.length > 18) b.trail.shift();
      b.trail.forEach(t => t.life -= dt);
      b.trail = b.trail.filter(t => t.life > 0);

      applySpin(b, dt);
      stabilize(b);
      b.x += b.vx * dt;
      b.y += b.vy * dt;

      if (b.y < CFG.arena.pad + b.r) wallBounce(b, true);
      if (b.y > H - CFG.arena.pad - b.r) wallBounce(b, false);
      collidePaddle(b, state.player, true);
      collidePaddle(b, state.enemy, false);
      collideBlocks(b);
      stabilize(b);

      if (b.x < -48) { state.balls.splice(i, 1); hurtPlayer(1); }
      else if (b.x > W + 48) {
        state.balls.splice(i, 1);
        let dmg = b.damage;
        if (state.mods.spinDamage && Math.abs(b.spin) > .75) { dmg++; floatText(W - 80, b.y, "SPIN +1", C.cyan); }
        hitEnemy(dmg, W - 70, b.y);
      }
    }
  }

  function applySpin(b, dt) {
    b.lift = 0;
    if (Math.abs(b.spin) < .01) return;
    const sp = speedOf(b);
    if (sp < 1) return;
    const nx = -b.vy / sp, ny = b.vx / sp;
    const lift = b.spin * CFG.ball.magnus * sp;
    b.vx += nx * lift * dt;
    b.vy += ny * lift * dt;
    b.spin *= Math.pow(CFG.ball.spinDecay, dt);
    b.lift = Math.abs(lift);
  }

  function stabilize(b, force = false) {
    const max = CFG.ball.maxSpeed + state.room * 14;
    if (!Number.isFinite(b.vx) || !Number.isFinite(b.vy)) {
      const d = Math.random() < .5 ? -1 : 1;
      Object.assign(b, { vx: d * CFG.ball.minSpeed, vy: rand(-130, 130), spin: 0, lift: 0, wallBounceStreak: 0 });
      return;
    }
    let sp = speedOf(b);
    if (sp < CFG.ball.minSpeed) {
      const s = CFG.ball.minSpeed / Math.max(sp, 1);
      b.vx *= s; b.vy *= s; sp = CFG.ball.minSpeed;
    }
    if (force) {
      const dir = b.lastHit === "player" ? 1 : b.lastHit === "enemy" ? -1 : (b.vx < 0 ? -1 : 1);
      const ys = Math.sign(b.vy || rand(-1, 1));
      const target = clamp(sp, CFG.ball.minSpeed, max);
      const a = rand(.28, .48);
      b.vx = dir * Math.cos(a) * target;
      b.vy = ys * Math.sin(a) * target;
      b.spin *= .58;
      b.wallBounceStreak = 0;
      floatText(b.x, b.y, "ESCAPE", C.cyan);
      return;
    }
    const dir = b.vx < 0 ? -1 : 1;
    const minVx = sp * CFG.ball.minHorizontalRatio;
    if (Math.abs(b.vx) < minVx) b.vx = dir * minVx;
    const maxVy = Math.abs(b.vx) * CFG.ball.maxVerticalRatio;
    if (Math.abs(b.vy) > maxVy) b.vy = Math.sign(b.vy || rand(-1, 1)) * maxVy;
    sp = speedOf(b);
    if (sp > max) { const s = max / sp; b.vx *= s; b.vy *= s; }
  }

  function wallBounce(b, top) {
    const now = performance.now();
    if (!b.lastWallBounceAt || now - b.lastWallBounceAt > 1200) b.wallBounceStreak = 0;
    b.lastWallBounceAt = now;
    b.wallBounceStreak++;
    if (top) { b.y = CFG.arena.pad + b.r; b.vy = Math.abs(b.vy); }
    else { b.y = H - CFG.arena.pad - b.r; b.vy = -Math.abs(b.vy); }
    applyWallSpin(b, top);
    stabilize(b, b.wallBounceStreak >= 2 || Math.abs(b.vy) > Math.abs(b.vx) * 1.22);
    burst(b.x, b.y, C.cyan, b.wallBounceStreak >= 2 ? 18 : 8);
  }

  function applyWallSpin(b, top) {
    const normal = top ? 1 : -1;
    const surfaceV = b.spin * b.r * normal;
    const slip = b.vx - surfaceV;
    b.vx += -slip * CFG.ball.wallFriction;
    b.spin += slip * CFG.ball.wallSpinTransfer * normal;
    b.spin = clamp(b.spin * CFG.ball.wallSpinKeep, -CFG.ball.maxSpin, CFG.ball.maxSpin);
    if (Math.abs(b.spin) > .06) {
      b.vx += b.spin * normal * CFG.ball.wallExitBias;
      b.vy += Math.sign(b.vy || normal) * Math.abs(b.spin) * 12;
    }
  }

  function paddleRect(p) { return { x: p.x, y: p.y - p.h / 2, w: p.w, h: p.h }; }
  function rectCircle(r, b) {
    const cx = clamp(b.x, r.x, r.x + r.w), cy = clamp(b.y, r.y, r.y + r.h);
    return (b.x - cx) ** 2 + (b.y - cy) ** 2 <= b.r ** 2;
  }

  function collidePaddle(b, p, player) {
    const r = paddleRect(p);
    if (!rectCircle(r, b)) return;
    if (player && b.vx > 0) return;
    if (!player && b.vx < 0) return;
    const rel = clamp((b.y - p.y) / (p.h / 2), -1, 1);
    const sp = Math.max(CFG.ball.minSpeed, speedOf(b) * 1.035);
    const a = rel * .86;
    const tangential = clamp(p.vy / 620 + rel * .46, -1.7, 1.7);
    b.spin = clamp(b.spin * .28 + tangential * (player ? state.mods.spinPower : .7), -CFG.ball.maxSpin, CFG.ball.maxSpin);
    b.vx = (player ? 1 : -1) * Math.cos(a) * sp;
    b.vy = Math.sin(a) * sp + p.vy * .15 + rand(-7, 7);
    b.lastHit = player ? "player" : "enemy";
    b.wallBounceStreak = 0;
    b.x = player ? r.x + r.w + b.r + .2 : r.x - b.r - .2;
    stabilize(b);
    burst(b.x, b.y, player ? C.cyan : p.color, Math.abs(b.spin) > .65 ? 22 : 12);
    if (Math.abs(b.spin) > .65) floatText(b.x, b.y - 18, b.spin > 0 ? "TOPSPIN" : "BACKSPIN", b.spin > 0 ? C.gold : C.purple);
  }

  function collideBlocks(b) {
    for (let i = state.blocks.length - 1; i >= 0; i--) {
      const block = state.blocks[i];
      if (!rectCircle(block, b)) continue;
      const cx = block.x + block.w / 2, cy = block.y + block.h / 2;
      const dx = (b.x - cx) / (block.w / 2), dy = (b.y - cy) / (block.h / 2);
      if (Math.abs(dx) > Math.abs(dy)) {
        const side = dx >= 0 ? 1 : -1;
        b.vx = Math.abs(b.vx) * side;
        b.x = cx + side * (block.w / 2 + b.r + .8);
        b.spin *= .96;
      } else {
        const side = dy >= 0 ? 1 : -1;
        b.vy = Math.abs(b.vy) * side;
        b.y = cy + side * (block.h / 2 + b.r + .8);
        b.spin *= .94;
      }
      b.wallBounceStreak = 0;
      stabilize(b);
      block.hp--;
      addScore(block.type === "stone" ? 28 : 18, cx, cy);
      burst(cx, cy, blockColor(block), 12);
      if (block.type === "portal") { b.y = H - b.y; b.vx *= 1.04; b.vy += rand(-90, 90); stabilize(b); burst(b.x, b.y, C.purple, 20); }
      if (block.type === "spike" && b.lastHit !== "player") hurtPlayer(1);
      if (block.hp <= 0) { state.blocks.splice(i, 1); scheduleBlock(); addScore(block.type === "spike" ? 80 : block.type === "portal" ? 95 : 50, cx, cy, "BROKE"); }
      return;
    }
  }

  function hurtPlayer(n) {
    if (state.player.invuln > 0) return;
    if (state.mods.shield > 0) { state.mods.shield--; floatText(90, state.player.y, "SHIELD", C.cyan); burst(state.player.x + 14, state.player.y, C.cyan, 28); return; }
    state.player.hp -= n;
    state.player.invuln = 1;
    state.combo = 0;
    state.flash = .2;
    state.shake = 10;
    burst(state.player.x, state.player.y, C.pink, 34);
    if (state.player.hp <= 0) { state.mode = "gameover"; saveBest(); syncButton(); }
  }

  function hitEnemy(n, x, y) {
    if (Math.random() < state.mods.crit) { n *= 2; floatText(x, y - 20, "CRIT", C.gold); }
    state.enemy.hp -= n;
    state.enemy.stun = Math.max(state.enemy.stun, .12);
    state.shake = Math.max(state.shake, 4 + n * 2);
    addScore(70 * n, x, y, "-" + n + " HP");
    burst(x, y, state.enemy.color, 20 + n * 5);
    if (state.enemy.hp <= 0 && state.mode === "playing") {
      state.balls = [];
      addScore(250 + state.room * 50, W / 2, H / 2, "ROOM CLEAR");
      state.mode = "cleared";
      setTimeout(() => { if (state.mode === "cleared") createDraft(); }, 350);
    }
  }

  function addScore(points, x, y, label) {
    const gain = Math.round(points * (1 + Math.min(1.5, state.combo * .05)));
    state.score += gain;
    state.combo++;
    state.comboTimer = 2;
    floatText(x, y, label || "+" + gain, C.gold);
  }

  function floatText(x, y, text, color) { state.floats.push({ x, y, text, color, life: .82, vy: -38 }); }
  function burst(x, y, color, n) {
    for (let i = 0; i < n; i++) {
      const a = rand(0, Math.PI * 2), s = rand(35, 240);
      state.particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, r: rand(1.2, 3.4), color, life: rand(.25, .85) });
    }
  }

  function updateEffects(dt) {
    for (const p of state.particles) { p.x += p.vx * dt; p.y += p.vy * dt; p.vx *= Math.pow(.06, dt); p.vy *= Math.pow(.06, dt); p.life -= dt; }
    state.particles = state.particles.filter(p => p.life > 0);
    for (const f of state.floats) { f.y += f.vy * dt; f.life -= dt; }
    state.floats = state.floats.filter(f => f.life > 0);
  }

  function saveBest() { if (state.score > state.best) { state.best = state.score; store.set("spinstate-rally-best", state.best); } }
  function mainBall() { return state.balls[0] || null; }

  function physicsValues() {
    const b = mainBall(), sp = speedOf(b), spin = b ? b.spin : 0;
    return [
      ["Ball", sp.toFixed(0) + " px/s", C.cyan],
      ["VX / VY", b ? b.vx.toFixed(0) + " / " + b.vy.toFixed(0) : "0 / 0", C.text],
      ["Spin", spin.toFixed(2), spin >= 0 ? C.gold : C.purple],
      ["Magnus", b ? b.lift.toFixed(0) + " px/s²" : "0 px/s²", C.text],
      ["Spin decay", CFG.ball.spinDecay.toFixed(3) + "/s", C.text],
      ["Wall keep", Math.round(CFG.ball.wallSpinKeep * 100) + "%", C.text],
      ["Paddle", paddleMultiplier().toFixed(2) + "×", C.cyan],
      ["Respawn", respawnDelay().toFixed(2) + "s", C.text],
      ["Input", pointer.mode, C.text],
      ["Blocks", state.blocks.length + "+" + state.previews.length + "/" + targetBlocks(), C.text],
      ["Shield", String(state.mods ? state.mods.shield : 0), C.text],
      ["Crit", Math.round((state.mods ? state.mods.crit : 0) * 100) + "%", C.text]
    ];
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.save();
    if (state.shake) ctx.translate(rand(-state.shake, state.shake), rand(-state.shake, state.shake));
    drawBackground(); drawArena(); drawPreviews(); drawBlocks();
    if (state.player && state.enemy) { drawPaddle(state.player); drawPaddle(state.enemy, state.enemy.stun > 0 ? .55 : 1); }
    drawBalls(); drawEffects(); drawHud();
    ctx.restore();
    if (state.flash > 0) { ctx.fillStyle = `rgba(255,95,126,${state.flash})`; ctx.fillRect(0, 0, W, H); }
    if (state.mode === "title") drawTitle();
    if (state.mode === "upgrade") drawUpgrade();
    if (state.mode === "gameover") drawEnd(false);
    if (state.mode === "victory") drawEnd(true);
    if (state.paused) drawPause();
  }

  function drawBackground() {
    const g = ctx.createLinearGradient(0, 0, W, H);
    g.addColorStop(0, "#101735"); g.addColorStop(.56, "#070914"); g.addColorStop(1, "#16091c");
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    ctx.save(); ctx.globalAlpha = .15; ctx.strokeStyle = C.cyan;
    for (let x = -H; x < W + H; x += 48) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x - H * .22, H); ctx.stroke(); }
    ctx.restore();
  }

  function drawArena() {
    ctx.save(); ctx.strokeStyle = "rgba(255,255,255,.16)"; ctx.lineWidth = 2;
    round(CFG.arena.pad, CFG.arena.pad, W - CFG.arena.pad * 2, H - CFG.arena.pad * 2, 22); ctx.stroke();
    ctx.setLineDash([8, 14]); ctx.beginPath(); ctx.moveTo(W / 2, 30); ctx.lineTo(W / 2, H - 30); ctx.stroke(); ctx.restore();
  }

  function drawPreviews() {
    for (const p of state.previews) {
      const ratio = clamp(1 - p.time / p.total, 0, 1), col = blockColor(p);
      ctx.save(); ctx.globalAlpha = .22 + ratio * .35 + Math.sin(performance.now() / 120) * .06;
      ctx.strokeStyle = col; ctx.fillStyle = col; ctx.lineWidth = 2; ctx.setLineDash([7, 7]); round(p.x, p.y, p.w, p.h, 7); ctx.stroke();
      ctx.globalAlpha = .10 + ratio * .18; ctx.fill(); ctx.setLineDash([]); ctx.globalAlpha = .95;
      ctx.fillStyle = C.text; ctx.font = "800 11px ui-sans-serif, system-ui"; ctx.textAlign = "center"; ctx.fillText(p.time.toFixed(1), p.x + p.w / 2, p.y - 7);
      ctx.restore();
    }
  }

  function drawBlocks() {
    for (const b of state.blocks) {
      const col = blockColor(b);
      ctx.save(); ctx.shadowColor = col; ctx.shadowBlur = b.type === "portal" ? 18 : 8; ctx.fillStyle = col; ctx.globalAlpha = b.type === "stone" ? .75 : .9;
      round(b.x, b.y, b.w, b.h, 7); ctx.fill(); ctx.globalAlpha = 1; ctx.shadowBlur = 0; ctx.strokeStyle = "rgba(255,255,255,.24)"; ctx.stroke();
      if (b.maxHp > 1) { ctx.fillStyle = "rgba(0,0,0,.36)"; ctx.fillRect(b.x + 6, b.y + b.h - 7, b.w - 12, 3); ctx.fillStyle = C.text; ctx.fillRect(b.x + 6, b.y + b.h - 7, (b.w - 12) * b.hp / b.maxHp, 3); }
      if (b.type === "spike") drawSpikes(b); if (b.type === "portal") drawPortal(b); ctx.restore();
    }
  }

  function drawSpikes(b) {
    ctx.fillStyle = "rgba(0,0,0,.38)";
    for (let i = 0; i < 3; i++) { ctx.beginPath(); ctx.moveTo(b.x + 9 + i * 12, b.y + b.h - 5); ctx.lineTo(b.x + 15 + i * 12, b.y + 6); ctx.lineTo(b.x + 21 + i * 12, b.y + b.h - 5); ctx.fill(); }
  }
  function drawPortal(b) { ctx.strokeStyle = "rgba(255,255,255,.76)"; ctx.beginPath(); ctx.ellipse(b.x + b.w / 2, b.y + b.h / 2, 13, 7, performance.now() / 350, 0, Math.PI * 2); ctx.stroke(); }

  function drawPaddle(p, alpha = 1) {
    const r = paddleRect(p), g = ctx.createLinearGradient(r.x, r.y, r.x + r.w, r.y + r.h);
    g.addColorStop(0, p.color); g.addColorStop(1, "#fff"); ctx.save(); ctx.globalAlpha = alpha; ctx.shadowColor = p.color; ctx.shadowBlur = 18; ctx.fillStyle = g; round(r.x, r.y, r.w, r.h, 8); ctx.fill(); ctx.restore();
  }

  function drawBalls() {
    for (const b of state.balls) {
      for (let i = 0; i < b.trail.length; i++) {
        const t = b.trail[i]; ctx.save(); ctx.globalAlpha = (i / b.trail.length) * .23; ctx.fillStyle = Math.abs(b.spin) > .7 ? C.gold : C.cyan; ctx.beginPath(); ctx.arc(t.x, t.y, b.r * (i / b.trail.length), 0, Math.PI * 2); ctx.fill(); ctx.restore();
      }
      ctx.save(); ctx.shadowColor = Math.abs(b.spin) > .7 ? C.gold : C.cyan; ctx.shadowBlur = 22;
      const g = ctx.createRadialGradient(b.x - 3, b.y - 3, 1, b.x, b.y, b.r + 5); g.addColorStop(0, "#fff"); g.addColorStop(.5, C.cyan); g.addColorStop(1, "rgba(255,255,255,.16)");
      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();
      if (Math.abs(b.spin) > .06) { const a = performance.now() / 120 * (b.spin > 0 ? 1 : -1); ctx.globalAlpha = clamp(Math.abs(b.spin) / 2.5, .24, .95); ctx.shadowBlur = 0; ctx.strokeStyle = b.spin > 0 ? C.gold : C.purple; ctx.lineWidth = 2.2; ctx.beginPath(); ctx.arc(b.x, b.y, b.r + 5, a, a + Math.PI * 1.25); ctx.stroke(); }
      ctx.restore();
    }
  }

  function drawEffects() {
    for (const p of state.particles) { ctx.save(); ctx.globalAlpha = clamp(p.life, 0, 1); ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill(); ctx.restore(); }
    for (const f of state.floats) { ctx.save(); ctx.globalAlpha = clamp(f.life * 1.25, 0, 1); ctx.fillStyle = f.color; ctx.font = "800 16px ui-sans-serif, system-ui"; ctx.textAlign = "center"; ctx.fillText(f.text, f.x, f.y); ctx.restore(); }
  }

  function drawHud() {
    if (!state.player || !state.enemy) return;
    const w = Math.min(860, W - 28), x = W / 2 - w / 2, y = 16;
    ctx.save(); ctx.fillStyle = "rgba(0,0,0,.34)"; round(x, y, w, 104, 18); ctx.fill(); ctx.strokeStyle = "rgba(255,255,255,.14)"; ctx.stroke();
    drawStats(x, y, w); drawPhysics(x, y + 62, w);
    if (state.messageTimer > 0) { ctx.textAlign = "center"; ctx.fillStyle = `rgba(245,247,255,${clamp(state.messageTimer, 0, 1)})`; ctx.font = "900 42px ui-sans-serif, system-ui"; ctx.fillText(state.message, W / 2, H / 2 - 116); }
    ctx.restore();
  }

  function drawStats(x, y, w) {
    const c = x + w / 2;
    ctx.textAlign = "center"; ctx.fillStyle = C.text; ctx.font = "900 16px ui-sans-serif, system-ui"; ctx.fillText("Room " + state.room + "/" + CFG.rooms, c - 300, y + 27);
    drawHearts(c - 224, y + 24); drawEnemyBar(c - 58, y + 17, 190);
    ctx.fillStyle = C.gold; ctx.font = "900 17px ui-sans-serif, system-ui"; ctx.fillText(String(state.score).padStart(6, "0"), c + 235, y + 27);
    ctx.fillStyle = C.muted; ctx.font = "700 11px ui-sans-serif, system-ui"; ctx.fillText("BEST " + state.best, c + 235, y + 45);
  }

  function drawEnemyBar(x, y, w) {
    ctx.fillStyle = "rgba(255,255,255,.12)"; round(x, y, w, 10, 7); ctx.fill();
    ctx.fillStyle = state.enemy.color; round(x, y, w * clamp(state.enemy.hp / state.enemy.maxHp, 0, 1), 10, 7); ctx.fill();
    ctx.fillStyle = C.muted; ctx.font = "700 11px ui-sans-serif, system-ui"; ctx.textAlign = "center"; ctx.fillText("Enemy " + Math.max(0, state.enemy.hp) + "/" + state.enemy.maxHp, x + w / 2, y + 28);
  }

  function drawPhysics(x, y, w) {
    const cols = W < 760 ? 2 : 4, colW = w / cols;
    ctx.font = "800 11px ui-sans-serif, system-ui"; ctx.textAlign = "left";
    physicsValues().forEach(([label, value, color], i) => {
      const tx = x + 18 + (i % cols) * colW, ty = y + Math.floor(i / cols) * 17;
      ctx.fillStyle = C.muted; ctx.fillText(label, tx, ty); ctx.fillStyle = color || C.text; ctx.fillText(value, tx + 76, ty);
    });
  }

  function drawHearts(x, y) { for (let i = 0; i < state.mods.maxHp; i++) { ctx.fillStyle = i < state.player.hp ? C.pink : "rgba(255,255,255,.16)"; heart(x + i * 20, y, 7.5); ctx.fill(); } }

  function drawTitle() {
    overlay(.75); ctx.save(); ctx.textAlign = "center";
    ctx.fillStyle = C.text; ctx.font = `900 ${clamp(W * .07, 42, 76)}px ui-sans-serif, system-ui`; ctx.fillText("Spinstate Rally", W / 2, H * .28);
    ctx.fillStyle = C.cyan; ctx.font = "900 22px ui-sans-serif, system-ui"; ctx.fillText("Quantum-curved roguelike pong", W / 2, H * .28 + 42);
    ctx.fillStyle = C.muted; ctx.font = "600 18px ui-sans-serif, system-ui"; wrapText("Full-window playfield. Spin uses a Magnus-style force perpendicular to velocity. Hold Shift to boost paddle speed; hold Alt/Ctrl for precision movement.", W / 2, H * .44, Math.min(760, W - 50), 28);
    drawButton(W / 2 - 132, H * .62, 264, 58, "Start game", C.cyan); ctx.restore();
  }

  function drawUpgrade() {
    overlay(.78); ctx.save(); ctx.textAlign = "center";
    ctx.fillStyle = C.text; ctx.font = "900 44px ui-sans-serif, system-ui"; ctx.fillText("Choose a Relic", W / 2, 92);
    ctx.fillStyle = C.muted; ctx.font = "700 16px ui-sans-serif, system-ui"; ctx.fillText("Click a card or press 1, 2, or 3.", W / 2, 122);
    const compact = W < 820, cw = compact ? Math.min(280, W - 40) : 250, ch = compact ? 132 : 220, gap = 18;
    const sx = compact ? W / 2 - cw / 2 : W / 2 - (cw * 3 + gap * 2) / 2, sy = compact ? 150 : 180;
    state.draft.forEach((r, i) => drawCard(r, i, compact ? sx : sx + i * (cw + gap), compact ? sy + i * (ch + 14) : sy, cw, ch, compact));
    ctx.restore();
  }

  function drawCard(r, i, x, y, w, h, compact) {
    ctx.save(); ctx.fillStyle = "rgba(14,18,37,.94)"; ctx.strokeStyle = "rgba(255,255,255,.18)"; ctx.lineWidth = 2; round(x, y, w, h, 18); ctx.fill(); ctx.stroke();
    ctx.fillStyle = C.gold; ctx.font = compact ? "900 34px ui-sans-serif, system-ui" : "900 48px ui-sans-serif, system-ui"; ctx.fillText(r.icon, x + w / 2, y + (compact ? 42 : 64));
    ctx.fillStyle = C.text; ctx.font = compact ? "900 18px ui-sans-serif, system-ui" : "900 22px ui-sans-serif, system-ui"; ctx.fillText((i + 1) + ". " + r.name, x + w / 2, y + (compact ? 72 : 106));
    ctx.fillStyle = C.muted; ctx.font = compact ? "700 13px ui-sans-serif, system-ui" : "700 15px ui-sans-serif, system-ui"; wrapText(r.desc, x + w / 2, y + (compact ? 98 : 144), w - 42, compact ? 18 : 22); ctx.restore();
  }

  function drawEnd(victory) {
    overlay(.76); ctx.save(); ctx.textAlign = "center";
    ctx.fillStyle = victory ? C.gold : C.pink; ctx.font = `900 ${clamp(W * .06, 42, 64)}px ui-sans-serif, system-ui`; ctx.fillText(victory ? "Dungeon Cleared" : "Run Ended", W / 2, H * .32);
    ctx.fillStyle = C.text; ctx.font = "900 26px ui-sans-serif, system-ui"; ctx.fillText("Score " + state.score + " · Best " + state.best, W / 2, H * .32 + 50);
    drawButton(W / 2 - 120, H * .54, 240, 54, "Restart", victory ? C.gold : C.pink); ctx.restore();
  }

  function drawPause() {
    overlay(.68); ctx.save(); ctx.textAlign = "center";
    ctx.fillStyle = C.text; ctx.font = "900 54px ui-sans-serif, system-ui"; ctx.fillText("Paused", W / 2, H * .22);
    const boxW = Math.min(660, W - 38), boxH = 296, x = W / 2 - boxW / 2, y = H * .31;
    ctx.fillStyle = "rgba(14,18,37,.92)"; round(x, y, boxW, boxH, 18); ctx.fill(); ctx.strokeStyle = "rgba(255,255,255,.18)"; ctx.stroke();
    ["Controls", "W/S or ↑/↓: move paddle", "Hold Shift: faster paddle · Hold Alt/Ctrl: precision", "Mouse/touch: active only after pointer movement", "Move while hitting: add realistic spin", "1/2/3: choose relic · P: resume · R: restart"].forEach((line, i) => {
      ctx.fillStyle = i === 0 ? C.cyan : C.muted; ctx.font = i === 0 ? "900 20px ui-sans-serif, system-ui" : "700 15px ui-sans-serif, system-ui"; ctx.fillText(line, W / 2, y + 34 + i * 27);
    });
    ctx.textAlign = "left"; ctx.fillStyle = C.gold; ctx.font = "900 14px ui-sans-serif, system-ui"; ctx.fillText("Live physics", x + 28, y + 204);
    ctx.fillStyle = C.muted; ctx.font = "700 12px ui-sans-serif, system-ui";
    physicsValues().slice(0, 8).forEach(([l, v], i) => ctx.fillText(l + ": " + v, x + 28 + (i % 2) * (boxW / 2 - 12), y + 228 + Math.floor(i / 2) * 18));
    ctx.restore();
  }

  function overlay(a) { ctx.fillStyle = `rgba(5,7,18,${a})`; ctx.fillRect(0, 0, W, H); }
  function drawButton(x, y, w, h, text, color) { ctx.save(); ctx.shadowColor = color; ctx.shadowBlur = 18; ctx.fillStyle = color; round(x, y, w, h, 16); ctx.fill(); ctx.shadowBlur = 0; ctx.fillStyle = "rgba(0,0,0,.72)"; ctx.font = "900 18px ui-sans-serif, system-ui"; ctx.textAlign = "center"; ctx.fillText(text, x + w / 2, y + h / 2 + 6); ctx.restore(); }
  function wrapText(text, x, y, maxW, lineH) { const words = text.split(" "); let line = ""; for (const word of words) { const test = line + word + " "; if (ctx.measureText(test).width > maxW && line) { ctx.fillText(line.trim(), x, y); line = word + " "; y += lineH; } else line = test; } ctx.fillText(line.trim(), x, y); }
  function round(x, y, w, h, r) { r = Math.min(r, w / 2, h / 2); ctx.beginPath(); ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r); ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath(); }
  function heart(x, y, s) { ctx.beginPath(); ctx.moveTo(x, y + s * .35); ctx.bezierCurveTo(x - s * 1.2, y - s * .55, x - s * 1.8, y + s * .55, x, y + s * 1.55); ctx.bezierCurveTo(x + s * 1.8, y + s * .55, x + s * 1.2, y - s * .55, x, y + s * .35); ctx.closePath(); }

  function canvasPoint(e) { const r = canvas.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; }
  function clickAt(x, y) {
    if (["title", "gameover", "victory"].includes(state.mode)) { newRun(); return; }
    if (state.mode !== "upgrade") return;
    const compact = W < 820, cw = compact ? Math.min(280, W - 40) : 250, ch = compact ? 132 : 220, gap = 18;
    const sx = compact ? W / 2 - cw / 2 : W / 2 - (cw * 3 + gap * 2) / 2, sy = compact ? 150 : 180;
    for (let i = 0; i < 3; i++) {
      const cx = compact ? sx : sx + i * (cw + gap), cy = compact ? sy + i * (ch + 14) : sy;
      if (x >= cx && x <= cx + cw && y >= cy && y <= cy + ch) chooseRelic(i);
    }
  }

  function syncButton() {
    if (state.mode === "title") { actionButton.hidden = false; actionButton.textContent = "Start game"; }
    else if (state.mode === "gameover" || state.mode === "victory") { actionButton.hidden = false; actionButton.textContent = "Restart"; }
    else actionButton.hidden = true;
  }

  function activateKeyboard() { pointer.mode = "keyboard"; pointer.active = false; }
  function updatePointer(e, force = false) {
    const p = canvasPoint(e);
    const moved = pointer.lastX === null || Math.hypot(p.x - pointer.lastX, p.y - pointer.lastY) > 2;
    pointer.lastX = p.x; pointer.lastY = p.y;
    if (force || moved) { pointer.mode = "mouse"; pointer.active = true; pointer.y = p.y; }
    return p;
  }

  actionButton.addEventListener("click", newRun);
  canvas.addEventListener("pointerdown", e => { const p = updatePointer(e, true); clickAt(p.x, p.y); canvas.focus(); e.preventDefault(); });
  canvas.addEventListener("pointermove", e => { updatePointer(e); e.preventDefault(); });
  canvas.addEventListener("pointerleave", e => { if (e.pointerType !== "mouse") pointer.active = false; });
  canvas.addEventListener("touchmove", e => e.preventDefault(), { passive: false });

  window.addEventListener("keydown", e => {
    keys.add(e.code);
    if (["KeyW", "KeyS", "ArrowUp", "ArrowDown"].includes(e.code)) activateKeyboard();
    if (["Space", "ArrowUp", "ArrowDown"].includes(e.code)) e.preventDefault();
    if (e.code === "Space") { if (["title", "gameover", "victory"].includes(state.mode)) newRun(); else if (state.mode === "playing" && !state.balls.length) serve(1); }
    if (e.code === "KeyR") newRun();
    if (e.code === "KeyP" && state.mode === "playing") state.paused = !state.paused;
    if (state.mode === "upgrade" && ["Digit1", "Digit2", "Digit3", "Numpad1", "Numpad2", "Numpad3"].includes(e.code)) chooseRelic(Number(e.code.replace("Digit", "").replace("Numpad", "")) - 1);
  });

  window.addEventListener("keyup", e => keys.delete(e.code));
  window.addEventListener("blur", () => { keys.clear(); if (state.mode === "playing") state.paused = true; });
  window.addEventListener("resize", resize);
  window.addEventListener("orientationchange", resize);

  function loop(t) {
    const dt = Math.min(.033, (t - state.last) / 1000 || 0);
    state.last = t;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  resize(); syncButton(); draw(); requestAnimationFrame(loop);
})();
</script>
</body>
</html>
